# clients.conf — Static NAS client definitions
#
# Most NAS clients (MikroTik routers) are loaded dynamically from the
# "nas" database table via the SQL module (read_clients = yes in sql config).
# FreeRADIUS reads the nas table at startup, so restart the container
# after adding a new router:  docker restart wassal-freeradius
#
# The entries below are only for infrastructure and debugging.

client localhost {
    ipaddr = 127.0.0.1
    secret = $ENV{RADIUS_SECRET}
    shortname = localhost
}

# Docker internal network — allows radtest from host or other containers
client dockernet {
    ipaddr = 172.16.0.0/12
    secret = $ENV{RADIUS_SECRET}
    shortname = docker
}

# WireGuard VPN network — allows MikroTik routers connected via WireGuard
# This is a fallback entry. Per-router NAS entries (with unique secrets)
# from the database override this once FreeRADIUS is restarted/reloaded.
client wireguard {
    ipaddr = 10.10.10.0/24
    secret = $ENV{RADIUS_SECRET}
    shortname = wireguard
}

# NOTE: Each MikroTik router is also registered in the nas table with
# a unique per-router RADIUS secret. FreeRADIUS reads the nas table
# at startup (read_clients=yes). The backend auto-reloads FreeRADIUS
# after adding a new NAS entry.
